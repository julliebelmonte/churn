
data:
  raw_path: "data/raw/online_retail_customer_churn.csv"
  processed_path: "data/processed/"
  artifacts_path: "artifacts/"

# -----------------------------------------------------------------------------
# Janelas temporais
#
# DECISÃO DE NEGÓCIO: por que 90 dias de observação?
#   - Captura pelo menos um ciclo de comportamento mensal completo (3x)
#   - Curto o suficiente para ser relevante (comportamento de 2 anos atrás
#     não prediz churn amanhã)
#   - Padrão da indústria para varejo: 60-90 dias
#
# DECISÃO DE NEGÓCIO: por que 30 dias de predição?
#   - O time de retenção precisa de tempo real para agir (ligar, enviar oferta)
#   - Janelas muito longas (>60 dias) tornam o sinal mais ruidoso
#   - Janelas muito curtas (<7 dias) não permitem ação
# -----------------------------------------------------------------------------

windows:
  observation_days: 90    
  prediction_days: 30     


# -----------------------------------------------------------------------------
segmentation:
# CustomerSegmenter._TENURE_BINS e _TENURE_LABELS em segmentation.py
  tenure_bins:   [0, 2, 5, 10, 999]
  tenure_labels: ["new", "early", "mature", "veteran"]
 
  # Encoding ordinal dos segmentos — deve espelhar CustomerSegmenter._ENC_MAP
  tenure_encoding:     {new: 0, early: 1, mature: 2, veteran: 3}
  recency_encoding:    {active: 0, warm: 1, cold: 2, dormant: 3}
  engagement_encoding: {low: 0, medium: 1, high: 2, vip: 3}
 
  # Recência e engagement: bins aprendidos por percentil no fit()
  # Os labels abaixo documentam a semântica — não são usados como bins fixos
  recency_labels:    ["active", "warm", "cold", "dormant"]
  engagement_labels: ["low", "medium", "high", "vip"]

# -----------------------------------------------------------------------------
# Pré-processamento
# -----------------------------------------------------------------------------
preprocessing:
  # Colunas que não entram no modelo — identificadores, não features
  cols_to_drop: ["Customer_ID"]

  categorical_cols: ["Gender", "Promotion_Response"]
  boolean_cols: ["Email_Opt_In"]
  numeric_cols:
    - "Age"
    - "Annual_Income"
    - "Total_Spend"
    - "Years_as_Customer"
    - "Num_of_Purchases"
    - "Average_Transaction_Amount"
    - "Num_of_Returns"
    - "Num_of_Support_Contacts"
    - "Satisfaction_Score"
    - "Last_Purchase_Days_Ago"

  target_col: "Target_Churn"

  test_size:   0.2    # fração reservada para o bloco temp (val + test)
  temp_split:  0.5    # fração do temp usada como teste → val=10%, test=10%
  random_state: 42
  stratify: true      # preserva proporção de Target_Churn em todas as partições

# -----------------------------------------------------------------------------
# Modelagem
# -----------------------------------------------------------------------------
model:
  algorithm: "lightgbm"   # alternativa: "xgboost", "random_forest"

  calibration: "isotonic" # isotonic > platt para datasets maiores

  # Threshold de classificação
  # DECISÃO: não usar 0.5 — otimizar pelo custo de negócio.
  # Custo de FN (não detectar churn): perda do MRR do cliente
  # Custo de FP (campanha desnecessária): custo do incentivo
  # Ratio típico FN/FP: 5:1 → threshold mais baixo (~0.35)
  decision_threshold: 0.35
  fbeta_beta: 2.0 

  lightgbm_params:
    n_estimators: 500
    learning_rate: 0.05
    max_depth: 6
    num_leaves: 31
    min_child_samples: 29
    subsample: 0.8
    colsample_bytree: 0.8
    reg_alpha: 0.1
    reg_lambda: 0.1
    scale_pos_weight: 5
    random_state: 42


# -----------------------------------------------------------------------------
# Inferência
# -----------------------------------------------------------------------------
inference:
  # Tiers de risco para o CRM — thresholds do schemas._score_to_tier()
  # Alterar aqui requer alterar também a função em inference/schemas.py
  risk_tiers:
    high:   0.65   # score >= 0.65 → acionar imediatamente
    medium: 0.35   # score >= 0.35 → fila de retenção
    low:    0.0    # score < 0.35 → monitorar
 
  # Capacidade operacional do time de retenção
  # Usado pelo Evaluator.captured_churn_rate() e PerformanceTracker._ccr()
  # Significa: "o CRM consegue acionar no máximo X% da base por ciclo"
  crm_capacity_pct: 0.20

# -----------------------------------------------------------------------------
# Monitoramento (MLOps)
# -----------------------------------------------------------------------------
monitoring:
  # --- Data drift (KS-test por feature) ---
  # KS statistic > ks_alert_threshold → feature com drift
  # Usado por DriftDetector(ks_threshold=...) em monitoring/drift_detector.py
  ks_alert_threshold: 0.10
 
  # --- Concept drift (PSI no score de saída do modelo) ---
  # PSI < 0.10 → estável
  # PSI 0.10–0.20 → mudança moderada, investigar
  # PSI > 0.20 → instabilidade severa, retreinar
  # CORREÇÃO: separados em dois campos nomeados explicitamente.
  #   Versão anterior tinha psi_threshold_warning e psi_threshold_critical
  #   mas o DriftDetector usa apenas um threshold (PSI_ALERT_THRESHOLD = 0.20).
  #   Mantidos os dois para o operador ter contexto de investigação vs ação.
  psi_warning:  0.10   # investigar — sem ação imediata
  psi_critical: 0.20   # usado como PSI_ALERT_THRESHOLD no DriftDetector
 
  # --- Degradação de performance (quando labels chegam, T+30) ---
  # Queda absoluta em pp em relação ao baseline do deploy.
  # Usado por PerformanceTracker._check_alerts() em monitoring/performance_tracker.py
  # CORREÇÃO: adicionados os três campos que o tracker realmente verifica.
  #   Versão anterior tinha só performance_degradation_threshold (genérico),
  #   mas o tracker verifica roc_auc, pr_auc e ccr separadamente.
  roc_auc_drop_alert:  0.05   # queda > 5 pp no ROC-AUC
  pr_auc_drop_alert:   0.05   # queda > 5 pp no PR-AUC
  ccr_drop_alert:      0.08   # queda > 8 pp no CCR — métrica principal de negócio
 
  # --- CCR drop para concept drift (sem labels disponíveis) ---
  # Quando o CCR real está disponível, o DriftDetector combina PSI + CCR drop.
  ccr_drop_threshold: 0.08
 
  # --- Frequência de retreino ---
  retraining_schedule: "weekly"
